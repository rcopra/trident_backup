####################################################################################
####################################################################################


[gcode_macro Z_TILT_ADJUST]     # IDM/Cartographer optimized 3Z leveling macro
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT         # Save current state for Z tilt adjustment
    # Change LED status
    STATUS_LEVELING
    BED_MESH_CLEAR                             # Clear bed mesh
    {% if not printer.z_tilt.applied %}
      _Z_TILT_ADJUST horizontal_move_z=10 retry_tolerance=1   # Adjust Z tilt with higher tolerance initially
    {% endif %}
    _Z_TILT_ADJUST horizontal_move_z=2          # Fine-tune Z tilt adjustment
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT       # Restore saved state after adjustment


[gcode_macro _RESET_VELOCITY_LIMIT]
description: Restore all velocity limits to configured defaults
gcode:
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity}
    SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
    SET_VELOCITY_LIMIT MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={printer.configfile.settings.printer.square_corner_velocity}
    M220 S100
    M221 S100

####################################################################################
##                               Probe Calibration Macro
####################################################################################
[gcode_macro PROBECALIBRATE]
# Defines a G-code macro for probe calibration
gcode:
    G28                          # Home all axes
    G0 X175 Y175 Z1 F3600        # Fast move to X150 Y150 Z1 at 3600 mm/min
    PROBE_CALIBRATE              # Start probe calibration

####################################################################################
##                               Bed Leveling and Height Calibration Macro
####################################################################################
[gcode_macro G32]
# Defines a G-code macro for bed leveling and height calibration
gcode:
    BED_MESH_CLEAR               # Clear bed mesh
    G28                          # Home all axes
    Z_TILT_ADJUST                # Perform gantry leveling
    G28                          # Home all axes
    G0 X175 Y175 Z30 F3600       # Fast move to X150 Y150 Z30 at 3600 mm/min

####################################################################################
##                                   PRINT_START
####################################################################################

[gcode_macro PRINT_START]
gcode:
  # --- Slicer-provided parameters ---
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("40")|int %}
  {% set initial_tool = params.TOOL|default("0")|int %}
  {% set material = params.MATERIAL | default("UNKNOWN") %}

  # --- Toolhead centering coordinates ---
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # --- Compute heatsoak intent up front ---
  # Only soak if the slicer asked for a real chamber target AND the chamber is still cold.
  {% set current_chamber = printer["heater_generic heater_chamber"].temperature|float %}
  {% set soak_threshold = target_chamber - 10 %}
  {% set needs_chamber_soak = target_chamber >= 40 and current_chamber < soak_threshold %}

  # Bed overshoot helps drive chamber temp up faster via radiation.
  # Only meaningful when we're actually soaking.
  #   40-54°C chamber target: +25 (bed does most of the heatsoak work)
  #   55°C+ chamber target:   +18 (bedfans-as-chamber-heater pull more weight)
  {% set bed_overshoot = 0 %}
  {% if needs_chamber_soak %}
    {% if target_chamber >= 55 %}
      {% set bed_overshoot = 18 %}
    {% else %}
      {% set bed_overshoot = 25 %}
    {% endif %}
  {% endif %}

  {% set soak_bed_target = [target_bed + bed_overshoot, 120] | min %}
  {% set current_bed = printer.heater_bed.temperature|float %}
  {% set needs_bed_heat = current_bed < soak_bed_target * 0.9 %}

  # Fixed gantry: +Z lowers the bed. Z=80 drops the bed far from the nozzle to
  # maximise bed-surface radiation into the chamber. Z=15 is standby — close
  # enough that no extra motion is wasted when a soak isn't needed.
  {% set z_position = 80 if needs_chamber_soak else 15 %}

  # --- Execute ---
  CLEAR_PAUSE

  # Cancel any pending fume-pack shutdown from a previous print
  UPDATE_DELAYED_GCODE ID=_fume_pack_off DURATION=0

  # Home, clear any prior mesh, center toolhead over the bed
  STATUS_HOMING
  G28
  G90
  BED_MESH_CLEAR
  G1 X{x_wait} Y{y_wait} Z{z_position} F9000

  # Bed heat — soak target, wait only if we're far off
  SET_DISPLAY_TEXT MSG="Bed: {soak_bed_target}C"
  STATUS_HEATING
  {% if needs_bed_heat %}
    M190 S{soak_bed_target}
  {% else %}
    M140 S{soak_bed_target}
    SET_DISPLAY_TEXT MSG="Bed within 10% of {soak_bed_target}C"
  {% endif %}

  # Chamber soak branch — only runs when actually needed
  {% if needs_chamber_soak %}
    SET_DISPLAY_TEXT MSG="Heatsoak: {soak_threshold}C"
    SET_CHAMBER CHAMBER_TEMP={target_chamber}
    TEMPERATURE_WAIT SENSOR="heater_generic heater_chamber" MINIMUM={soak_threshold}

    {% if bed_overshoot > 0 %}
      SET_DISPLAY_TEXT MSG="Chamber warm, bed to {target_bed}C"
      M140 S{target_bed}
    {% endif %}
  {% else %}
    # Non-soak path: let the bed surface equilibrate before leveling & auto-Z
    SET_DISPLAY_TEXT MSG="Bed stabilisation: 5 min"
    G4 P300000
  {% endif %}

  # Preheat hotend for Cartographer Touch
  SET_DISPLAY_TEXT MSG="Hotend: 145C"
  M109 S145

  # Gantry leveling (Z_TILT_ADJUST manages its own Z)
  SET_DISPLAY_TEXT MSG="Leveling"
  STATUS_LEVELING
  Z_TILT_ADJUST
  G28 Z

  # Nozzle cleaning and Cartographer Touch
  AFC_BRUSH
  SET_DISPLAY_TEXT MSG="Cartographer Touch"
  CARTOGRAPHER_TOUCH_HOME
  _SET_CARTO_OFFSET MATERIAL={material}

  # Adaptive bed mesh for the current print area
  SET_DISPLAY_TEXT MSG="Bed mesh"
  STATUS_MESHING
  BED_MESH_CALIBRATE ADAPTIVE=1 PROFILE=print_mesh

  # Park and load the initial tool via AFC
  AFC_PARK
  T{initial_tool}

  # Heat hotend to final print temperature
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}C"
  STATUS_HEATING
  M107
  M109 S{target_extruder}

  # Squiggle purge and hand off to the print
  SET_DISPLAY_TEXT MSG="Printer goes brr"
  STATUS_PRINTING
  G0 Z0.4
  G91
  SQUIGGLY_PURGE
  G90

  # Apply skew correction
  SKEW_PROFILE LOAD=Califlower

#--------------------------------------------------------------------
[gcode_macro PRINT_END]
gcode:
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.axis_maximum.y - 5 %}
    {% set z_safe = th.position.z + (50 if th.position.z + 50 <= th.axis_maximum.z else th.axis_maximum.z - th.position.z) %}

    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-2.0 F3600                 ; retract filament

    TURN_OFF_HEATERS

    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{y_safe} F18000  ; park nozzle at rear
    M107                                     ; turn off fan

    BED_MESH_CLEAR

    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0

    _RESET_VELOCITY_LIMIT
    SET_SKEW CLEAR=1

    # Energy wind-down: aux blower off immediately, fume pack after 5 min, steppers off
    SET_FAN_SPEED FAN=fan2 SPEED=0
    UPDATE_DELAYED_GCODE ID=_fume_pack_off DURATION=300
    M84

# Delayed fume-pack shutdown: gives the exhaust 5 min after print end to clear
# residual fumes from the chamber, then turns off. Cancelled at PRINT_START if
# a new print begins before it fires.
[delayed_gcode _fume_pack_off]
gcode:
  SET_FAN_SPEED FAN=fan3 SPEED=0


#--------------------------------------------------------------------
[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  # {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  # {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  {% set x_park = 300 %}
  {% set y_park = 0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 50.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}
#--------------------------------------------------------------------
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  RESUME_BASE {get_params}
#--------------------------------------------------------------------

[gcode_macro CANCEL_PRINT]
# Defines a G-code macro to cancel the actual running print
description = Cancel the actual running print
rename_existing = CANCEL_PRINT_BASE
variable_park = True
gcode =
    G91
    G0 Z10
    G90
    G28 Y                                     # Home Y axis
    _TOOLHEAD_PARK_PAUSE_CANCEL               # Call _TOOLHEAD_PARK_PAUSE_CANCEL macro
    TURN_OFF_HEATERS                          # Turn off all heaters
    CANCEL_PRINT_BASE                         # Call CANCEL_PRINT_BASE to cancel print

    # Energy wind-down: aux blower off, fume pack after 5 min, steppers off
    SET_FAN_SPEED FAN=fan2 SPEED=0
    UPDATE_DELAYED_GCODE ID=_fume_pack_off DURATION=300
    M84

   _RESET_VELOCITY_LIMIT

[gcode_macro SET_CHAMBER]
gcode:
  {% set chamber_target = params.CHAMBER_TEMP|default(0)|float %}
  SET_HEATER_TEMPERATURE heater=heater_chamber target={chamber_target}


