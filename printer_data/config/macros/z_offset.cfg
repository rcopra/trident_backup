# Per-material Z offset for Cartographer. Reads its lookup table from the
# central _MATERIAL_PROFILES container so all material-specific tuning lives
# in one place (see material_profiles.cfg).
#
# Pass the material from your slicer, e.g. for Orca:
#   _SET_CARTO_OFFSET MATERIAL=[filament_type]
# PRINT_START already does this — see print.cfg.

[gcode_macro _SET_CARTO_OFFSET]
description: Set Cartographer Z offset per material
gcode:
    {% set material = params.MATERIAL | default("UNKNOWN") | upper %}
    {% set table = printer["gcode_macro _MATERIAL_PROFILES"].material_profiles %}
    {% if material not in table %}
        RESPOND TYPE=error MSG="Material '{material}' is unknown — add it to _MATERIAL_PROFILES.material_profiles"
        { action_raise_error("Material '" ~ material ~ "' not in _MATERIAL_PROFILES") }
    {% endif %}
    {% set delta = table[material].carto_offset %}
    RESPOND MSG="Applying Cartographer offset for {material}: {delta}"
    SET_GCODE_OFFSET Z={delta}

