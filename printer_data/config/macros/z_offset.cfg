[gcode_macro SET_CARTO_OFFSET]
description: Adjust cartographer Z offset per material relative to current base
variable_filament_table:
    {
        "PETG": 0.01,
        "ASA" : 0.00,
    }
gcode:
    {% set material = params.MATERIAL | upper %}
    
    {% if material in variable_filament_table %}
        {% set delta = variable_filament_table[material] %}
        {% set current_offset = printer["cartographer touch_model default"].z_offset %}
        {% set new_offset = current_offset + delta %}
        
        RESPOND MSG="Adjusting Z offset for {material}: base {current_offset} + delta {delta} = {new_offset}"
        SET_GCODE_OFFSET Z={new_offset}
    {% else %}
        RESPOND MSG="No adjustment defined for {material}, keeping current Z offset {printer['cartographer touch_model default'].z_offset}"
    {% endif %}
