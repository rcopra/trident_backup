[gcode_macro _SET_CARTO_OFFSET]
description: Adjust cartographer Z offset per material relative to base ABS
variable_filament_table:
    {
        "PETG": 0.02,
        "ASA" : 0.00
    }
gcode:
    {% set material = params.MATERIAL | upper %}
    
    {% if material in variable_filament_table %}
        {% set delta = variable_filament_table[material] %}
        RESPOND MSG="Applying Z offset delta {delta} for {material}"
        SET_GCODE_OFFSET Z={delta}
    {% else %}
        RESPOND MSG="No adjustment defined for {material}, keeping current Z offset"
    {% endif %}
