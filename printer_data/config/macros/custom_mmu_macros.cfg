###########################################################################
# Custom MMU helper macros — adapted from igiannakas/Voron-backups
#   https://github.com/igiannakas/Voron-backups/blob/main/printer_data/config/macros/custom_mmu_macros.cfg
#
# Layout assumptions vs igiannakas:
#   - No blobifier (purge-bucket extensions stripped)
#   - No separate nozzle stop / silicone wiper — gantry brush only.
#     PARK = move to the left edge of the brush, UNPARK = retreat in -X.
#   - Toolhead cutter pin lives at variable_pin_loc_xy in _MMU_CUT_TIP_VARS.
#
# Remember to add  [include macros/custom_mmu_macros.cfg]  to printer.cfg.
###########################################################################

[gcode_macro _CUSTOM_PARK_VARS]
description: Tunable coordinates for PARK / UNPARK / CLEAN_NOZZLE
# Defaults seeded from _KOMB_Variables (brush at X 224..254, Y 352..357).
# Anything tagged "CHANGE ME" should be measured/verified on the printer.
variable_park_x:             267    # Ported from AFC park_loc_xy (center of brush, not left edge)
variable_park_y:             355    # Ported from AFC park_loc_xy
variable_brush_x_min:        224    # AFC brush_loc 249 - brush_width/2 (50/2)
variable_brush_x_max:        274    # AFC brush_loc 249 + brush_width/2
variable_brush_y_offset_row: 358    # AFC brush center 355 + brush_depth/2 (6/2)
variable_unpark_x_offset:    30     # CHANGE ME — mm retreated in -X when leaving the brush (also approach lane width)
variable_clear_y_drop:       40     # CHANGE ME — mm dropped in -Y after CLEAN_NOZZLE to clear the brush
variable_travel_f:           27000  # XY travel feedrate (mm/min) — usually fine as-is
variable_clean_f:            18000  # brush stroke feedrate (mm/min) — usually fine as-is
gcode:
    { action_respond_info("_CUSTOM_PARK_VARS holds settings only") }


###########################################################################
# PARK — route the toolhead onto the brush start with a safe approach
#
# Approach pattern (mirrors igiannakas's nozzle-stop path):
#   1. If we're already deep into the back AND right of the approach lane,
#      drop Y first so we don't drag the nozzle through the bristles.
#   2. Slide to approach_x (left of the brush) at the current Y.
#   3. Move up onto the brush row at approach_x.
#   4. Slide along Y=park_y onto park_x.
#
# Happy Hare calls this with RESTORE=1 X=.. Y=.. when restoring a saved
# position — in that case just G1 directly to the supplied coords.
###########################################################################
[gcode_macro PARK]
gcode:
    {% set v = printer['gcode_macro _CUSTOM_PARK_VARS'] %}
    {% set restore = params.RESTORE|default("0")|int %}
    {% set x = params.X|default(v.park_x)|float %}
    {% set y = params.Y|default(v.park_y)|float %}
    {% set f = params.F|default(v.travel_f)|int %}
    {% set approach_x = v.park_x - v.unpark_x_offset %}

    {% if restore == 1 %}
        G1 X{x} Y{y} F{f}

    {% elif ((printer.gcode_move.gcode_position.x - v.park_x)|abs > 0.05)
         or ((printer.gcode_move.gcode_position.y - v.park_y)|abs > 0.05) %}
        SAVE_GCODE_STATE NAME=SET_PARK_STATE
        G90
        # If we're already up in the brush band, drop Y first to avoid dragging bristles
        {% if (printer.gcode_move.gcode_position.y > v.brush_y_offset_row - 5)
              and (printer.gcode_move.gcode_position.x > approach_x) %}
            G1 Y{v.brush_y_offset_row - 10} F{f}
        {% endif %}
        G1 X{approach_x} F{f}                # left of brush
        G1 X{approach_x} Y{v.park_y} F{f}    # up onto brush row
        G1 X{v.park_x} Y{v.park_y} F{f}      # slide onto brush start
        RESTORE_GCODE_STATE NAME=SET_PARK_STATE
    {% endif %}


###########################################################################
# UNPARK — small -X retreat from the brush so subsequent travel is safe
###########################################################################
[gcode_macro UNPARK]
gcode:
    {% set v = printer['gcode_macro _CUSTOM_PARK_VARS'] %}
    {% set f = params.F|default(v.travel_f)|int %}
    {% set approach_x = v.park_x - v.unpark_x_offset %}
    SAVE_GCODE_STATE NAME=SET_UNPARK_STATE
    G90
    G1 X{approach_x} F{f}
    RESTORE_GCODE_STATE NAME=SET_UNPARK_STATE


###########################################################################
# CLEAN_NOZZLE — replaces the KOMB invocation for routine wipes.
# Logic mirrors igiannakas's gantry-brush sweep: park first, then alternating
# X strokes across the brush with one offset-row pass, finally clear the brush.
###########################################################################
[gcode_macro CLEAN_NOZZLE]
gcode:
    {% set v = printer['gcode_macro _CUSTOM_PARK_VARS'] %}
    PARK
    G90

    G1 X{v.brush_x_max}                       F{v.clean_f}
    G1 X{v.brush_x_min}                       F{v.clean_f}
    G1 X{v.brush_x_max}                       F{v.clean_f}
    G1 X{v.brush_x_min}                       F{v.clean_f}
    G1 X{v.brush_x_max} Y{v.brush_y_offset_row} F{v.clean_f}
    G1 X{v.brush_x_min}                       F{v.clean_f}
    G1 X{v.brush_x_max}                       F{v.clean_f}
    G1 X{v.brush_x_min}                       F{v.clean_f}
    G1 X{v.brush_x_max}                       F{v.clean_f}

    # Move away from the brush so the next travel doesn't graze it
    G1 Y{v.brush_y_offset_row - v.clear_y_drop} F{v.clean_f}


###########################################################################
# _CUT_TIP_DO_CUT_MOTION (override)
# Identical cut sequence to Happy Hare's default, with the igiannakas tweak:
# wait for the cut to finish (M400) then immediately PARK to minimise ooze.
###########################################################################
[gcode_macro _CUT_TIP_DO_CUT_MOTION]
description: Helper to do a single cut movement
gcode:
    {% set pin_park_x_loc = params.PIN_PARK_X_LOC | float %}
    {% set pin_park_y_loc = params.PIN_PARK_Y_LOC | float %}
    {% set vars = printer['gcode_macro _MMU_CUT_TIP_VARS'] %}
    {% set cutting_axis = vars['cutting_axis'] %}

    {% set pin_loc = vars['pin_loc_compressed']|default(-999)|float %}
    {% if pin_loc != -999 %}
        # Legacy one-dimensional pin_loc_compressed config
        {% if cutting_axis == "x" %}
            {% set pin_loc_compressed_x = pin_loc %}
            {% set pin_loc_compressed_y = pin_park_y_loc %}
        {% else %}
            {% set pin_loc_compressed_x = pin_park_x_loc %}
            {% set pin_loc_compressed_y = pin_loc %}
        {% endif %}
    {% else %}
        {% set pin_loc_compressed_x, pin_loc_compressed_y = vars.pin_loc_compressed_xy|map('float') %}
    {% endif %}

    {% set cut_fast_move_fraction = vars['cut_fast_move_fraction']|float %}
    {% set cut_fast_move_speed    = vars['cut_fast_move_speed']|float %}
    {% set cut_slow_move_speed    = vars['cut_slow_move_speed']|float %}
    {% set cut_dwell_time         = vars['cut_dwell_time']|float %}
    {% set evacuate_speed         = vars['evacuate_speed']|float %}
    {% set rip_length             = vars['rip_length']|float %}
    {% set rip_speed              = vars['rip_speed']|float %}
    {% set safe_margin_x, safe_margin_y = vars.safe_margin_xy|map('float') %}
    {% set travel_speed           = vars['travel_speed']|float %}

    {% set fast_slow_transition_loc_x = (pin_loc_compressed_x - pin_park_x_loc) * cut_fast_move_fraction + pin_park_x_loc|float %}
    {% set fast_slow_transition_loc_y = (pin_loc_compressed_y - pin_park_y_loc) * cut_fast_move_fraction + pin_park_y_loc|float %}
    G1 X{fast_slow_transition_loc_x} Y{fast_slow_transition_loc_y} F{cut_fast_move_speed * 60}  # fast approach
    G1 X{pin_loc_compressed_x} Y{pin_loc_compressed_y} F{cut_slow_move_speed * 60}              # slow cut

    G4 P{cut_dwell_time}
    {% if rip_length > 0 %}
        G1 E-{rip_length} F{rip_speed * 60}
    {% endif %}

    G1 X{pin_park_x_loc} Y{pin_park_y_loc} F{evacuate_speed * 60}  # evacuate

    # Clear the non-cutting axis so subsequent travel can't collide with the pin
    {% if cutting_axis == "x" %}
        G1 Y{pin_park_y_loc + safe_margin_y} F{travel_speed * 60}
    {% else %}
        G1 X{pin_park_x_loc + safe_margin_x} F{travel_speed * 60}
    {% endif %}

    # igiannakas tweak: wait for cut motion to finish, then park to limit ooze
    M400
    PARK


###########################################################################
# _CUT_TIP_MOVE_TO_CUTTER_PIN (override)
# Same default route to the pin, prefaced with an UNPARK so we don't scrape
# the nozzle off the brush sideways.
###########################################################################
[gcode_macro _CUT_TIP_MOVE_TO_CUTTER_PIN]
description: Helper to move the toolhead to the target pin in either safe or faster way, depending on toolhead clearance
gcode:
    {% set pin_park_x_loc = params.PIN_PARK_X_LOC|float %}
    {% set pin_park_y_loc = params.PIN_PARK_Y_LOC|float %}
    {% set vars = printer['gcode_macro _MMU_CUT_TIP_VARS'] %}

    {% set safe_margin_x, safe_margin_y = vars.safe_margin_xy|map('float') %}
    {% set travel_speed = vars['travel_speed']|float %}
    {% set cutting_axis = vars['cutting_axis'] %}

    UNPARK

    {% if ((printer.gcode_move.gcode_position.x - pin_park_x_loc)|abs < safe_margin_x)
       or ((printer.gcode_move.gcode_position.y - pin_park_y_loc)|abs < safe_margin_y) %}
        # Sequential axis move when we're already close — avoids collisions
        {% if cutting_axis == "x" %}
            G1 X{pin_park_x_loc} F{travel_speed * 60}
            G1 Y{pin_park_y_loc} F{travel_speed * 60}
        {% else %}
            G1 Y{pin_park_y_loc} F{travel_speed * 60}
            G1 X{pin_park_x_loc} F{travel_speed * 60}
        {% endif %}
    {% else %}
        G1 X{pin_park_x_loc} Y{pin_park_y_loc} F{travel_speed * 60}
    {% endif %}
