# Central per-material tuning. Other macros read these via:
#   {% set profile = printer["gcode_macro _MATERIAL_PROFILES"] %}
#   {% set value = profile.chamber_min_temp.get(material|upper, default) %}
#
# Add a new material by adding a key to each table. Missing keys fall back to
# whatever default the calling macro specifies.

[gcode_macro _MATERIAL_PROFILES]
description: Lookup tables for per-material print behaviour. Not called directly.
variable_chamber_min_temp:
    {
        "ABS":  55,
        "ASA":  55,
        "PETG": 35,
        "PLA":  25,
        "TPU":   0
    }
variable_carto_offset:
    {
        "PETG": 0.025
    }
gcode:
    M118 _MATERIAL_PROFILES is a data container, not a runnable macro.

