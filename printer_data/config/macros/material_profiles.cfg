# Central per-material tuning. Single nested dict — every material defines every
# key (uniform schema, mirrors Klippain's material_parameters pattern). Consumers
# read via:
#   {% set table = printer["gcode_macro _MATERIAL_PROFILES"].material_profiles %}
#   {% set m = table[material|upper] %}
# ...then m.chamber_min_temp / m.carto_offset / m.retract_length / etc.
#
# Consumers hard-raise if the material isn't in the dict. To add a new material,
# add a row below with EVERY key — partial entries will break consumers reading
# the missing keys. To revert to soft-fail (silent default), replace the
# `{% if material not in table %}` block in each consumer with a `.get()` chain.

[gcode_macro _MATERIAL_PROFILES]
description: Per-material print parameters. Not called directly.
variable_material_profiles:
    {
        "PLA":  {"chamber_min_temp": 25, "carto_offset": 0.0,    "retract_length": 0.5, "retract_speed": 35, "unretract_extra_length": 0, "unretract_speed": 35},
        "PETG": {"chamber_min_temp": 35, "carto_offset": 0.025,  "retract_length": 0.8, "retract_speed": 30, "unretract_extra_length": 0, "unretract_speed": 30},
        "ABS":  {"chamber_min_temp": 55, "carto_offset": 0.0,    "retract_length": 0.4, "retract_speed": 40, "unretract_extra_length": 0, "unretract_speed": 40},
        "PC":  {"chamber_min_temp": 55, "carto_offset": 0.0,    "retract_length": 0.4, "retract_speed": 40, "unretract_extra_length": 0, "unretract_speed": 40},
        "ASA":  {"chamber_min_temp": 55, "carto_offset": 0.0,    "retract_length": 0.4, "retract_speed": 40, "unretract_extra_length": 0, "unretract_speed": 40},
        "TPU":  {"chamber_min_temp": 0,  "carto_offset": 0.0,    "retract_length": 0.2, "retract_speed": 5,  "unretract_extra_length": 0, "unretract_speed": 5}
    }
gcode:
    M118 _MATERIAL_PROFILES is a data container, not a runnable macro.

