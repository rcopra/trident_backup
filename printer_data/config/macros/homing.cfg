####################################################################################
##                                    Homing Override
####################################################################################
[safe_z_home]
home_xy_position: 175, 175
z_hop: 5
z_hop_speed: 30
home_y_before_x: True


[homing_override]
axes: z                    # Override homing for the Z axis only
set_position_z: 0           # Set the Z position to 0 after homing
gcode:
    G90                     # Set to absolute positioning mode
    G0 Z10 F1200            # Move Z axis to 10mm above the bed at 1200 mm/min
    G28 X                   # Home X axis
    G28 Y                   # Home Y axis
    G1 X175 Y210 F7200      # Move to a specific coordinate (125, 125) at 7200 mm/min
    G28 Z                   # Home Z axis again
