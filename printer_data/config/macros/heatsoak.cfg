####################################################################################
##                                   HEATSOAK
####################################################################################

[gcode_macro HEATSOAK]
description: Heat bed and chamber to soak-ready state. Defaults to ABS profile
  (BED=120, CHAMBER=70). Polls the chamber up to TIMEOUT minutes (default 30);
  bails with a warning if the threshold isn't reached in time.
gcode:
  # HEATSOAK owns Z and centers XY — refuse to run on un-homed axes
  {% if "xyz" not in printer.toolhead.homed_axes %}
    { action_raise_error("HEATSOAK requires all axes homed — run G28 first") }
  {% endif %}

  # --- Inputs (defaults to ABS profile) ---
  {% set target_bed = params.BED|default(120)|int %}
  {% set target_chamber = params.CHAMBER|default(70)|int %}
  {% set material = params.MATERIAL|default("ABS")|upper %}
  {% set timeout = params.TIMEOUT|default(30)|int %}

  # --- Toolhead centering coordinates ---
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  # --- Compute heatsoak intent ---
  # The wait threshold is the lower of CHAMBER and CHAMBER_MIN_TEMP (or the
  # per-material default from _MATERIAL_PROFILES). The heater itself still
  # aims for CHAMBER — this only controls when the soak wait can return.
  {% set table = printer["gcode_macro _MATERIAL_PROFILES"].material_profiles %}
  {% set chamber_min_temp_default = table.get(material, {}).get('chamber_min_temp', 0) %}
  {% set target_chamber_min_temp = params.CHAMBER_MIN_TEMP|default(chamber_min_temp_default)|int %}
  {% set positive_thresholds = [target_chamber, target_chamber_min_temp]|select(">", 0)|list %}
  {% set soak_threshold = positive_thresholds|min if positive_thresholds else 0 %}
  {% set current_chamber = printer["heater_generic heater_chamber"].temperature|float %}
  {% set needs_chamber_soak = soak_threshold > 0 and current_chamber < soak_threshold %}

  # Bed overshoot helps drive chamber temp up faster via radiation.
  # Only meaningful when we're actually soaking, and only for warm-chamber
  # materials — low-target prints (e.g. PLA) skip overshoot entirely so the
  # bed stays at first-layer temperature (no warping).
  #   55°C+ chamber target:    +18 (bedfans-as-chamber-heater pull more weight)
  #   40-54°C chamber target:  +25 (bed does most of the heatsoak work)
  #   <40°C chamber target:     +0 (PLA-tier; bed runs at slicer target)
  {% set bed_overshoot = 0 %}
  {% if needs_chamber_soak %}
    {% if target_chamber >= 55 %}
      {% set bed_overshoot = 18 %}
    {% elif target_chamber >= 40 %}
      {% set bed_overshoot = 25 %}
    {% endif %}
  {% endif %}

  {% set soak_bed_target = [target_bed + bed_overshoot, 120] | min %}
  {% set current_bed = printer.heater_bed.temperature|float %}
  {% set needs_bed_heat = current_bed < soak_bed_target * 0.9 %}

  # Fixed gantry: +Z lowers the bed. Z=80 drops the bed far from the nozzle to
  # maximise bed-surface radiation into the chamber. Z=15 is standby — close
  # enough that no extra motion is wasted when a soak isn't needed.
  {% set z_position = 80 if needs_chamber_soak else 15 %}

  # --- Position toolhead ---
  G90
  G1 X{x_wait} Y{y_wait} Z{z_position} F9000

  # --- Chamber air circulation (soak only) ---
  # Toolhead PCF + aux blower drive heated air around the chamber to even out
  # temperature distribution during the soak. Skipped for cold-chamber materials
  # (PLA tier) where it would just be noise and wear.
  {% if needs_chamber_soak %}
    SET_FAN_SPEED FAN=fan0 SPEED=1.0
    SET_FAN_SPEED FAN=fan2 SPEED=1.0
  {% endif %}

  # --- Bed heat — soak target, wait only if we're far off ---
  SET_DISPLAY_TEXT MSG="Bed: {soak_bed_target}C"
  STATUS_HEATING
  {% if needs_bed_heat %}
    M190 S{soak_bed_target}
  {% else %}
    M140 S{soak_bed_target}
    SET_DISPLAY_TEXT MSG="Bed within 10% of {soak_bed_target}C"
  {% endif %}

  # Chamber heater target — always set, so it keeps cranking toward the
  # final CHAMBER target for the entire print, even when we skip the wait.
  SET_CHAMBER CHAMBER_TEMP={target_chamber}

  # Chamber soak branch — poll up to TIMEOUT minutes, bail with warning if not reached
  {% if needs_chamber_soak %}
    SET_DISPLAY_TEXT MSG="Heatsoak: {soak_threshold}C ({timeout}m max)"
    {% for i in range(timeout) %}
      _HEATSOAK_WAIT_TICK TARGET={soak_threshold} ELAPSED={i} TIMEOUT={timeout}
    {% endfor %}
    _HEATSOAK_TIMEOUT_CHECK TARGET={soak_threshold} TIMEOUT={timeout}

    {% if bed_overshoot > 0 %}
      SET_DISPLAY_TEXT MSG="Chamber warm, bed to {target_bed}C"
      M140 S{target_bed}
    {% endif %}
  {% endif %}


# The Jinja `for` loop in HEATSOAK expands at parse time into N calls of
# _HEATSOAK_WAIT_TICK. Each call reads chamber temp at *execution* time and
# either G4-waits 60s or no-ops, so once the threshold is reached the
# remaining queued ticks pass through instantly.

[gcode_macro _HEATSOAK_WAIT_TICK]
description: Internal — one minute of chamber-temp waiting for HEATSOAK
gcode:
  {% set target = params.TARGET|float %}
  {% set elapsed = params.ELAPSED|int %}
  {% set timeout = params.TIMEOUT|int %}
  {% set current = printer["heater_generic heater_chamber"].temperature|float %}
  {% if current < target %}
    M117 Heatsoak: {current|round(1)}/{target}C ({elapsed}/{timeout}m)
    G4 P60000
  {% endif %}

[gcode_macro _HEATSOAK_TIMEOUT_CHECK]
description: Internal — fires after the soak loop. Warns and proceeds if threshold not reached.
gcode:
  {% set target = params.TARGET|float %}
  {% set timeout = params.TIMEOUT|int %}
  {% set current = printer["heater_generic heater_chamber"].temperature|float %}
  {% if current < target %}
    RESPOND TYPE=error MSG="HEATSOAK timeout: chamber {current|round(1)}C < {target}C target after {timeout}m — proceeding with cold chamber"
    M117 Heatsoak timeout — chamber {current|round(1)}/{target}C
  {% endif %}
