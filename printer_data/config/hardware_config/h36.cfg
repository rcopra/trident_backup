[mcu h36]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_310025000950415742363820-if00

[extruder]
step_pin: h36:PB9
dir_pin: !h36:PB8
enable_pin: !h36:PB7
heater_pin: h36:PA7
sensor_pin: h36:PA6
pullup_resistor: 2200

[tmc2209 extruder]
uart_pin: h36:PC14
interpolate: false
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0
#diag_pin: h36:PC15

[temperature_sensor h36_NTC]
sensor_type: temperature_mcu
sensor_mcu: h36
min_temp: 0
max_temp: 150

[temperature_sensor Extruder_Driver]
sensor_type: Generic 3950
sensor_pin: h36:PA3
min_temp:0
max_temp:150

[multi_pin a4t_part_cooling]
pins: h36:PB15, h36:PB13

[filament_switch_sensor entry]
switch_pin: h36:PB1
pause_on_runout: False
runout_gcode:
    {% if printer.idle_timeout.state == 'Printing' %}
        RESPOND PREFIX=tgalarm MSG="Filament Runout Sensor Triggered"
        M117 Filament Runout Sensor Triggered
        PAUSE
    {% endif %}

[filament_switch_sensor exit]
switch_pin: h36:PA10
pause_on_runout: False

[neopixel A4T]
pin: h36:PA8
chain_count: 3
color_order: GRB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0
