################################################################################
## TMC Auto Tune
################################################################################


[autotune_tmc stepper_x]
motor: siboor-42sth48-2504(s45)
# voltage: 48

[autotune_tmc stepper_x1]
motor: siboor-42sth48-2504(s45)
# voltage: 48


[autotune_tmc stepper_y]
motor: siboor-42sth48-2504(s45)
# voltage: 48

[autotune_tmc stepper_y1]
motor: siboor-42sth48-2504(s45)
# voltage: 48


#####################################################################
#   x0 -------------- y0
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#   x1---  front  ---y1
#####################################################################
#                            X-Axis
#####################################################################

[stepper_x]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
position_min: -1.5
position_endstop: 350
position_max: 350
homing_speed: 150
homing_retract_dist: 5
endstop_pin: ^h36:PB1
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PD5
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
driver_TPFD: 0
run_current: 1.1
home_current: 1
current_change_dwell_time: 0.2
sense_resistor: 0.075
spi_speed: 3500000
interpolate: True

[stepper_x1]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200

[tmc5160 stepper_x1]
cs_pin: PC13
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
driver_TPFD: 0
run_current: 1.1
home_current: 1
current_change_dwell_time: 0.2
sense_resistor: 0.075
spi_speed: 3500000
interpolate: True

#####################################################################
#                           Y-Axis
#####################################################################

[stepper_y]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: ^PF2
position_min: 0
position_endstop: 360
position_max: 360
homing_speed: 150
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE3
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
driver_TPFD: 0
run_current: 1.1
home_current: 1
current_change_dwell_time: 0.2
sense_resistor: 0.075
spi_speed: 3500000
interpolate: True

[stepper_y1]
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200

[tmc5160 stepper_y1]
cs_pin: PC6
spi_software_sclk_pin: PG8
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
driver_TPFD: 0
run_current: 1.1
home_current: 1
current_change_dwell_time: 0.2
sense_resistor: 0.075
spi_speed: 3500000
interpolate: True

#####################################################################
#    -------z2-------
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#   |                 |
#  z0---   front  ---z1
#####################################################################
#                             Z Axis
#####################################################################
[stepper_z]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 240
position_min: -5.0
homing_speed: 20
homing_retract_dist: 0
homing_positive_dir: False

[tmc2209 stepper_z]
uart_pin: PG14
interpolate: true
run_current: 0.8
hold_current: 0.8
sense_resistor: 0.110


[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 4


[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: true
run_current: 0.8
hold_current: 0.8
sense_resistor: 0.110

[stepper_z2]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 4

[tmc2209 stepper_z2]
uart_pin: PB9
interpolate: true
run_current: 0.8
hold_current: 0.8
sense_resistor: 0.110

