[pause_resume]
recover_velocity: 150                   # Move back a bit faster after resuming a paused print

[gcode_arcs]
resolution: 0.3                        # Arc interpolation resolution, handles G2/G3 commands

[force_move]
enable_force_move: true                 # Enable force move feature

[idle_timeout]
# only turn off motors and heaters if the printer is not paused
gcode:
    {% if not (printer.pause_resume.is_paused) %}
        RESPOND MSG="Idle timeout reached"
        TURN_OFF_HEATERS
        M84
        #halo_off
        #SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=hotend_fan TARGET=45
        #SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_heater TARGET=0

    {% endif %}
timeout: 7200

# use skew correction, measured with califlower
[skew_correction]
