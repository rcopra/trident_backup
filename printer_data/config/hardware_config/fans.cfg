####################################################################
# Part Cooling & Exhaust
####################################################################

# Auxiliary 12032 blower (Orca addresses via M106 P2)
[fan_generic fan2]
pin: PA0
cycle_time: 0.00003              # ~33 kHz PWM, matched to blower
kick_start_time: 10

[multi_pin pcf_fan]
pins: h36:PA5, h36:PB13

[fan_generic fan0]
pin: multi_pin:pcf_fan

[heater_fan hotend_fan]
pin: h36:PA9
tachometer_pin: h36:PC6
tachometer_ppr: 2
tachometer_poll_interval: 0.0009
shutdown_speed: 1

# Fume pack exhaust (Orca M106 P3)
[fan_generic fan3]
pin: PF9
kick_start_time: 0.5

####################################################################
# Electronics Bay
####################################################################

# Skirt exhaust — evacuates hot air from the electronics bay.
# controller_fan runs whenever any heater or stepper is active, then
# coasts for idle_timeout seconds after activity stops.
[controller_fan Skirt_fan]
pin: PF7
max_power: 0.5                   # capped for noise; drivers get airflow from the MCU fan
cycle_time: 0.00003
kick_start_time: 0.8
idle_timeout: 60

# MCU fan (Arctic P12 Pro PST) — sits over the stepper drivers and the CM4.
# PID-controlled against CM4 temp; drivers ride along since the same airstream
# crosses them. Holds the CM4 at target_temp; loafs at min_speed when cool.
[controller_fan manta_fan]
pin: PA6
shutdown_speed: 0.05
cycle_time: 0.00004
kick_start_time: 0.4
fan_speed: 0.8
tachometer_pin: PC2
hardware_pwm: true
idle_speed: 0.2

####################################################################
# Slicer Integration
####################################################################

# Orca emits M106 P<n> S<0-255> to address multiple part-cooling fans.
# P=0 → fan0 (hotend part cooling, defined in extruder.cfg), P=2 → fan2, P=3 → fan3.
[gcode_macro M106]
gcode:
    {% set fan = 'fan' + (params.P|int if params.P is defined else 0)|string %}
    {% set speed = (params.S|float / 255 if params.S is defined else 1.0) %}
    SET_FAN_SPEED FAN={fan} SPEED={speed}
